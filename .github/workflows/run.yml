name: Weekly Paper Agent (Doubao)on:schedule:# 设置为每周六北京时间早上 9 点运行 (UTC 时间 1 点)- cron: '0 1 * * 6'workflow_dispatch: # 允许手动点击运行jobs:build:runs-on: ubuntu-lateststeps:- name: Checkout codeuses: actions/checkout@v4- name: Set up Pythonuses: actions/setup-python@v5with:python-version: '3.10'- name: Install dependenciesrun: pip install -r requirements.txt- name: Run Agentenv:FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}DOUBAO_ENDPOINT: ${{ secrets.DOUBAO_ENDPOINT }}run: python main.py
